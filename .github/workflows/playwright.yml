name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      smoke:
        type: boolean
        default: false
      regression:
        type: boolean
        default: false
      performance:
        type: boolean
        default: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # -------------------------
    # RUN TESTS
    # -------------------------
    - name: Run Playwright tests
      run: |
        echo "Smoke: ${{ github.event.inputs.smoke }}"
        echo "Regression: ${{ github.event.inputs.regression }}"
        echo "Performance: ${{ github.event.inputs.performance }}"

        TEST_PATHS=""
        STATUS="PASS"

        if [ "${{ github.event.inputs.smoke }}" == "true" ]; then
          TEST_PATHS="$TEST_PATHS tests/S_Smoke"
        fi

        if [ "${{ github.event.inputs.regression }}" == "true" ]; then
          TEST_PATHS="$TEST_PATHS tests/S_Regression"
        fi

        if [ "${{ github.event.inputs.performance }}" == "true" ]; then
          TEST_PATHS="$TEST_PATHS tests/S_Performance"
        fi

        if [ -z "$TEST_PATHS" ]; then
          echo "Running ALL tests"
          npx playwright test || STATUS="FAIL"
        else
          echo "Running: $TEST_PATHS"
          npx playwright test $TEST_PATHS || STATUS="FAIL"
        fi

        echo "STATUS=$STATUS" >> $GITHUB_ENV

    # -------------------------
    # SAVE REPORTS
    # -------------------------
    - name: Save reports by suite
      if: always()
      run: |
        REPORT_ID="run-${{ github.run_number }}"
        echo "Saving reports with ID: $REPORT_ID"

        mkdir -p reports

        save_report () {
          SUITE=$1
          mkdir -p reports/$SUITE/$REPORT_ID
          cp -r playwright-report/* reports/$SUITE/$REPORT_ID/
          DATE=$(date +"%Y-%m-%d_%H-%M-%S")
          printf '{"status":"%s","date":"%s"}\n' "$STATUS" "$DATE" > reports/$SUITE/$REPORT_ID/meta.json
        }

        if [ "${{ github.event.inputs.smoke }}" == "true" ]; then
          save_report smoke
        fi

        if [ "${{ github.event.inputs.regression }}" == "true" ]; then
          save_report regression
        fi

        if [ "${{ github.event.inputs.performance }}" == "true" ]; then
          save_report performance
        fi

        if [ "${{ github.event.inputs.smoke }}" != "true" ] && \
           [ "${{ github.event.inputs.regression }}" != "true" ] && \
           [ "${{ github.event.inputs.performance }}" != "true" ]; then
          save_report all
        fi

    # -------------------------
    # GENERATE DASHBOARD
    # -------------------------
    - name: Generate dashboard index
      if: always()
      run: |
        INDEX_FILE="reports/index.html"

        echo "Checking available suites..."
        ls -R reports || true

        # HTML HEADER
        echo '<html>' > $INDEX_FILE
        echo '<head>' >> $INDEX_FILE
        echo '<title>QA Dashboard</title>' >> $INDEX_FILE
        echo '<style>' >> $INDEX_FILE
        echo 'body { font-family: Arial; background:#0f172a; color:white; }' >> $INDEX_FILE
        echo 'h1 { text-align:center; }' >> $INDEX_FILE
        echo 'h2 { margin-top:30px; }' >> $INDEX_FILE
        echo '.card { background:#1e293b; padding:15px; margin:10px; border-radius:10px; }' >> $INDEX_FILE
        echo '.pass { color:#22c55e; }' >> $INDEX_FILE
        echo '.fail { color:#ef4444; }' >> $INDEX_FILE
        echo 'a { color:#38bdf8; text-decoration:none; }' >> $INDEX_FILE
        echo '</style>' >> $INDEX_FILE
        echo '</head>' >> $INDEX_FILE
        echo '<body>' >> $INDEX_FILE
        echo '<h1>QA Test Dashboard</h1>' >> $INDEX_FILE

        for SUITE in smoke regression performance all; do
          if [ -d "reports/$SUITE" ]; then
            echo "<h2>$SUITE</h2>" >> $INDEX_FILE

            for RUN in $(ls reports/$SUITE | sort -r); do
              META="reports/$SUITE/$RUN/meta.json"

              if [ -f "$META" ]; then
                STATUS=$(grep status $META | cut -d '"' -f4)
                DATE=$(grep date $META | cut -d '"' -f4)
              else
                STATUS="UNKNOWN"
                DATE="N/A"
              fi

              CLASS="pass"
              if [ "$STATUS" = "FAIL" ]; then
                CLASS="fail"
              fi

              echo "<div class='card'>" >> $INDEX_FILE
              echo "<b>$RUN</b><br>" >> $INDEX_FILE
              echo "📅 $DATE<br>" >> $INDEX_FILE
              echo "Status: <span class='$CLASS'>$STATUS</span><br>" >> $INDEX_FILE
              echo "<a href='./$SUITE/$RUN/index.html'>Ver reporte</a>" >> $INDEX_FILE
              echo "</div>" >> $INDEX_FILE
            done
          fi
        done

        echo '</body>' >> $INDEX_FILE
        echo '</html>' >> $INDEX_FILE

    # -------------------------
    # COMMIT REPORTS
    # -------------------------
    - name: Commit reports to repo
      if: always()
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add reports/
        git commit -m "Add test report ${{ github.run_number }}" || echo "No changes"
        git push

    # -------------------------
    # DEPLOY PAGES
    # -------------------------
    - name: Upload Pages Artifact
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: reports

    - name: Deploy to GitHub Pages
      if: always()
      id: deployment
      uses: actions/deploy-pages@v4

    # -------------------------
    # ARTIFACTS
    # -------------------------
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/
        if-no-files-found: ignore