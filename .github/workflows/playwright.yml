name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
          - performance

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: |
        TEST_TYPE="${{ github.event.inputs.test_type || 'all' }}"
        echo "Selected test type: $TEST_TYPE"

        if [ "$TEST_TYPE" = "smoke" ]; then
          npx playwright test tests/S_Smoke
        elif [ "$TEST_TYPE" = "regression" ]; then
          npx playwright test tests/S_Regression
        elif [ "$TEST_TYPE" = "performance" ]; then
          npx playwright test tests/S_Performance
        else
          npx playwright test
        fi

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/
        if-no-files-found: ignore

    - name: Upload Playwright Report for Pages
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report/

    - name: Deploy to GitHub Pages
      if: always()
      uses: actions/deploy-pages@v4